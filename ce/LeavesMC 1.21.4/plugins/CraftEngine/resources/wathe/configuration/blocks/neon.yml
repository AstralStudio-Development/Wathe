# Neon Blocks - Lamp blocks with axis property and chain toggle
items:
  wathe:neon_pillar:
    data:
      item-name: <!i><lang:block.wathe.neon_pillar>
    model: wathe:block/neon_pillar_unlit
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 1.5
          resistance: 1.5
          is-suffocating: true
          is-redstone-conductor: true
          map-color: 11
          tags: ["minecraft:mineable/pickaxe", "wathe:neon_blocks"]
          sounds:
            break: minecraft:block.copper_bulb.break
            fall: minecraft:block.copper_bulb.fall
            hit: minecraft:block.copper_bulb.hit
            place: minecraft:block.copper_bulb.place
            step: minecraft:block.copper_bulb.step
        behaviors:
          - type: toggleable_lamp_block
            can-toggle-with-hand: true
        states:
          properties:
            axis:
              type: axis
              default: y
            lit:
              type: boolean
              default: false
          appearances:
            y_off:
              auto-state: solid
              model:
                path: wathe:block/neon_pillar_unlit
            y_on:
              auto-state: solid
              model:
                path: wathe:block/neon_pillar_lit
            x_off:
              auto-state: solid
              model:
                path: wathe:block/neon_pillar_unlit_horizontal
                x: 90
                y: 90
            x_on:
              auto-state: solid
              model:
                path: wathe:block/neon_pillar_lit_horizontal
                x: 90
                y: 90
            z_off:
              auto-state: solid
              model:
                path: wathe:block/neon_pillar_unlit_horizontal
                x: 90
            z_on:
              auto-state: solid
              model:
                path: wathe:block/neon_pillar_lit_horizontal
                x: 90
          variants:
            axis=y,lit=false:
              appearance: y_off
            axis=y,lit=true:
              appearance: y_on
              settings:
                luminance: 15
            axis=x,lit=false:
              appearance: x_off
            axis=x,lit=true:
              appearance: x_on
              settings:
                luminance: 15
            axis=z,lit=false:
              appearance: z_off
            axis=z,lit=true:
              appearance: z_on
              settings:
                luminance: 15

  wathe:neon_tube:
    data:
      item-name: <!i><lang:block.wathe.neon_tube>
    model:
      type: minecraft:model
      path: wathe:block/neon_tube_item
      generation:
        parent: wathe:block/neon_tube_full_unlit
        textures:
          texture: wathe:block/neon_tube_unlit
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 1.5
          resistance: 1.5
          is-suffocating: false
          is-redstone-conductor: false
          map-color: 11
          tags: ["minecraft:mineable/pickaxe", "wathe:neon_blocks"]
          sounds:
            break: minecraft:block.copper_bulb.break
            fall: minecraft:block.copper_bulb.fall
            hit: minecraft:block.copper_bulb.hit
            place: minecraft:block.copper_bulb.place
            step: minecraft:block.copper_bulb.step
        behaviors:
          - type: toggleable_lamp_block
            can-toggle-with-hand: true
        states:
          properties:
            axis:
              type: axis
              default: y
            lit:
              type: boolean
              default: false
          appearances:
            y_off:
              auto-state: cactus
              model:
                path: wathe:block/neon_tube_y_unlit
                x: 90
                generation:
                  parent: wathe:block/neon_tube_full_unlit
                  textures:
                    texture: wathe:block/neon_tube_unlit
            y_on:
              auto-state: cactus
              model:
                path: wathe:block/neon_tube_y_lit
                x: 90
                generation:
                  parent: wathe:block/neon_tube_full
                  textures:
                    texture: wathe:block/neon_tube_lit
            x_off:
              auto-state: cactus
              model:
                path: wathe:block/neon_tube_x_unlit
                y: 90
                generation:
                  parent: wathe:block/neon_tube_full_unlit
                  textures:
                    texture: wathe:block/neon_tube_unlit
            x_on:
              auto-state: cactus
              model:
                path: wathe:block/neon_tube_x_lit
                y: 90
                generation:
                  parent: wathe:block/neon_tube_full
                  textures:
                    texture: wathe:block/neon_tube_lit
            z_off:
              auto-state: cactus
              model:
                path: wathe:block/neon_tube_z_unlit
                generation:
                  parent: wathe:block/neon_tube_full_unlit
                  textures:
                    texture: wathe:block/neon_tube_unlit
            z_on:
              auto-state: cactus
              model:
                path: wathe:block/neon_tube_z_lit
                generation:
                  parent: wathe:block/neon_tube_full
                  textures:
                    texture: wathe:block/neon_tube_lit
          variants:
            axis=y,lit=false:
              appearance: y_off
            axis=y,lit=true:
              appearance: y_on
              settings:
                luminance: 15
            axis=x,lit=false:
              appearance: x_off
            axis=x,lit=true:
              appearance: x_on
              settings:
                luminance: 15
            axis=z,lit=false:
              appearance: z_off
            axis=z,lit=true:
              appearance: z_on
              settings:
                luminance: 15
