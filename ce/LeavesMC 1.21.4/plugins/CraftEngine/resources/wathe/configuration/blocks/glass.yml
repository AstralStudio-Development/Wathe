# Glass Blocks
items:
  # Hull Glass (船体玻璃)
  wathe:hull_glass:
    data:
      item-name: <!i><lang:block.wathe.hull_glass>
    model: wathe:block/hull_glass
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          is-suffocating: false
          is-redstone-conductor: false
          map-color: 0
          tags:
            - minecraft:mineable/pickaxe
          sounds:
            break: minecraft:block.glass.break
            fall: minecraft:block.glass.fall
            hit: minecraft:block.glass.hit
            place: minecraft:block.glass.place
            step: minecraft:block.glass.step
        state:
          state: light_blue_stained_glass
          model:
            path: wathe:block/hull_glass
            generation:
              parent: minecraft:block/cube_all
              textures:
                all: wathe:block/hull_glass

