# Fancy Steel Blocks - cube_all types
items:
  # Anthracite Steel
  wathe:anthracite_steel:
    data:
      item-name: <!i><lang:block.wathe.anthracite_steel>
    model: wathe:block/anthracite_steel
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          is-suffocating: true
          is-redstone-conductor: true
          map-color: 11
          tags: ["minecraft:mineable/pickaxe"]
          sounds:
            break: minecraft:block.copper.break
            fall: minecraft:block.copper.fall
            hit: minecraft:block.copper.hit
            place: minecraft:block.copper.place
            step: minecraft:block.copper.step
        state:
          auto-state: solid
          model:
            path: wathe:block/anthracite_steel
            generation:
              parent: minecraft:block/cube_all
              textures:
                all: wathe:block/anthracite_steel

