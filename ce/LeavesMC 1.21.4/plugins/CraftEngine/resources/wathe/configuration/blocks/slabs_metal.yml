# Metal & Stone Slab Blocks
items:
  # Marble Slab (大理石台阶)
  wathe:marble_slab:
    data:
      item-name: <!i><lang:block.wathe.marble_slab>
    model: wathe:block/marble_slab
    behavior:
      type: block_item
      block:
        behaviors:
          type: slab_block
        loot:
          template: default:loot_table/slab
        settings:
          hardness: 2.0
          resistance: 2.0
          map-color: 8
          tags:
            - minecraft:mineable/pickaxe
            - minecraft:slabs
          sounds:
            break: minecraft:block.calcite.break
            fall: minecraft:block.calcite.fall
            hit: minecraft:block.calcite.hit
            place: minecraft:block.calcite.place
            step: minecraft:block.calcite.step
        states:
          template: default:block_state/slab
          arguments:
            base_block: cut_copper_slab
            model_bottom_path: wathe:block/marble_slab
            model_bottom_generation:
              parent: minecraft:block/slab
              textures: &marble_textures
                bottom: wathe:block/marble
                side: wathe:block/marble
                top: wathe:block/marble
            model_top_path: wathe:block/marble_slab_top
            model_top_generation:
              parent: minecraft:block/slab_top
              textures: *marble_textures
            model_double_path: wathe:block/marble

