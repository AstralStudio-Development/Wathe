                    texture: wathe:block/stainless_steel_bar
                x: 90
            axis=z,top=true,bottom=true:
              state: pointed_dripstone[thickness=base,vertical_direction=up,waterlogged=false]
              model:
                path: wathe:block/stainless_steel_bar_z
                generation:
                  parent: wathe:block/template_bar
                  textures:
                    texture: wathe:block/stainless_steel_bar
            axis=z,top=true,bottom=false:
