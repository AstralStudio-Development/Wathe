# Stone Blocks - cube_all types
items:
  # Marble Series
  wathe:marble:
    data:
      item-name: <!i><lang:block.wathe.marble>
    model: wathe:block/marble
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 2.0
          resistance: 2.0
          is-suffocating: true
          is-redstone-conductor: true
          map-color: 8
          tags: ["minecraft:mineable/pickaxe"]
          sounds:
            break: minecraft:block.calcite.break
            fall: minecraft:block.calcite.fall
            hit: minecraft:block.calcite.hit
            place: minecraft:block.calcite.place
            step: minecraft:block.calcite.step
        state:
          auto-state: solid
          model:
            path: wathe:block/marble
            generation:
              parent: minecraft:block/cube_all
              textures:
                all: wathe:block/marble

