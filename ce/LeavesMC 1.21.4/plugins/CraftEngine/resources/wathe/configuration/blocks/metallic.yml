# Metallic Blocks - Simple cube_all types
items:
  # Tarnished Gold Series
  wathe:tarnished_gold:
    data:
      item-name: <!i><lang:block.wathe.tarnished_gold>
    model: wathe:block/tarnished_gold
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          is-suffocating: true
          is-redstone-conductor: true
          map-color: 43
          tags: ["minecraft:mineable/pickaxe"]
          sounds:
            break: minecraft:block.netherite_block.break
            fall: minecraft:block.netherite_block.fall
            hit: minecraft:block.netherite_block.hit
            place: minecraft:block.netherite_block.place
            step: minecraft:block.netherite_block.step
        state:
          auto-state: solid
          model:
            path: wathe:block/tarnished_gold
            generation:
              parent: minecraft:block/cube_all
              textures:
                all: wathe:block/tarnished_gold

