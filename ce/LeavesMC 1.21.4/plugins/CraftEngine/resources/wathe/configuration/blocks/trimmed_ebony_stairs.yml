# Trimmed Ebony Stairs - Decorative stairs (simplified version without auto-connect)
items:
  wathe:trimmed_ebony_stairs:
    data:
      item-name: <!i><lang:block.wathe.trimmed_ebony_stairs>
    model: wathe:block/trimmed_ebony_stairs_single
    behavior:
      type: block_item
      block:
        events:
          - template: default:rotatable_block
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          map-color: 29
          tags:
            - minecraft:mineable/axe
            - minecraft:stairs
          sounds:
            break: minecraft:block.cherry_wood.break
            fall: minecraft:block.cherry_wood.fall
            hit: minecraft:block.cherry_wood.hit
            place: minecraft:block.cherry_wood.place
            step: minecraft:block.cherry_wood.step
        states:
          properties:
            facing:
              type: horizontal_direction
              default: north
          appearances:
            north:
              state: barrier
              entity-renderer:
                item: wathe:trimmed_ebony_stairs
            east:
              state: barrier
              entity-renderer:
                item: wathe:trimmed_ebony_stairs
                rotation: 90
            south:
              state: barrier
              entity-renderer:
                item: wathe:trimmed_ebony_stairs
                rotation: 180
            west:
              state: barrier
              entity-renderer:
                item: wathe:trimmed_ebony_stairs
                rotation: 270
          variants:
            facing=north:
              appearance: north
            facing=east:
              appearance: east
            facing=south:
              appearance: south
            facing=west:
              appearance: west
