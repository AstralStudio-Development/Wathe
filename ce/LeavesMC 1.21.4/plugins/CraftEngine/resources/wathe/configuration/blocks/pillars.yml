# Pillar Blocks - Rotatable column blocks
items:
  # Tarnished Gold Pillar (失光金柱)
  wathe:tarnished_gold_pillar:
    data:
      item-name: <!i><lang:block.wathe.tarnished_gold_pillar>
    model: wathe:block/tarnished_gold_pillar
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          map-color: 43
          tags:
            - minecraft:mineable/pickaxe
          sounds:
            break: minecraft:block.netherite_block.break
            fall: minecraft:block.netherite_block.fall
            hit: minecraft:block.netherite_block.hit
            place: minecraft:block.netherite_block.place
            step: minecraft:block.netherite_block.step
        states:
          properties:
            axis:
              type: axis
              default: y
          appearances:
            y:
              state: purpur_pillar[axis=y]
              model:
                path: wathe:block/tarnished_gold_pillar
                generation:
                  parent: minecraft:block/cube_column
                  textures:
                    end: wathe:block/tarnished_gold_pillar_top
                    side: wathe:block/tarnished_gold_pillar
            x:
              state: purpur_pillar[axis=x]
              model:
                path: wathe:block/tarnished_gold_pillar_horizontal
                generation:
                  parent: minecraft:block/cube_column_horizontal
                  textures:
                    end: wathe:block/tarnished_gold_pillar_top
                    side: wathe:block/tarnished_gold_pillar
            z:
              state: purpur_pillar[axis=z]
              model:
                path: wathe:block/tarnished_gold_pillar_horizontal_z
                generation:
                  parent: minecraft:block/cube_column_horizontal
                  textures:
                    end: wathe:block/tarnished_gold_pillar_top
                    side: wathe:block/tarnished_gold_pillar
                  y: 90
          variants:
            axis=y:
              appearance: y
            axis=x:
              appearance: x
            axis=z:
              appearance: z

