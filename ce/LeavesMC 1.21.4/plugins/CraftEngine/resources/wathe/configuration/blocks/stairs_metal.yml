# Metal & Stone Stairs Blocks
items:
  # Marble Stairs (大理石楼梯)
  wathe:marble_stairs:
    model: wathe:block/marble_stairs
    data:
      item-name: <!i><lang:block.wathe.marble_stairs>
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 2.0
          resistance: 2.0
          map-color: 8
          tags:
            - minecraft:mineable/pickaxe
            - minecraft:stairs
          sounds:
            break: minecraft:block.calcite.break
            fall: minecraft:block.calcite.fall
            hit: minecraft:block.calcite.hit
            place: minecraft:block.calcite.place
            step: minecraft:block.calcite.step
        behavior:
          type: stairs_block
        states:
          template: default:block_state/stairs
          arguments:
            base_block: oxidized_cut_copper_stairs
            model_stairs_inner_path: wathe:block/marble_stairs_inner
            model_stairs_inner_generation:
              parent: minecraft:block/inner_stairs
              textures: &marble_textures
                bottom: wathe:block/marble
                side: wathe:block/marble
                top: wathe:block/marble
            model_stairs_outer_path: wathe:block/marble_stairs_outer
            model_stairs_outer_generation:
              parent: minecraft:block/outer_stairs
              textures: *marble_textures
            model_stairs_path: wathe:block/marble_stairs
            model_stairs_generation:
              parent: minecraft:block/stairs
              textures: *marble_textures

