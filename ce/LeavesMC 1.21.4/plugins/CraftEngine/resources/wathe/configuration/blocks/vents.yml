  # ==================== Vent Hatches (Trapdoor-based, can open/close) ====================

  # Stainless Steel Vent Hatch
  wathe:stainless_steel_vent_hatch:
    data:
      item-name: <!i><lang:block.wathe.stainless_steel_vent_hatch>
    model:
      type: minecraft:model
      path: wathe:block/stainless_steel_vent_hatch_bottom
      generation:
        parent: wathe:block/template_vent_hatch_trapdoor_bottom
        textures:
          texture: wathe:block/stainless_steel_vent_hatch
    behavior:
      type: block_item
      block:
        behavior:
          type: trapdoor_block
          can-open-with-hand: true
          can-open-by-wind-charge: true
          sounds:
            open: minecraft:block.iron_trapdoor.open
            close: minecraft:block.iron_trapdoor.close
        loot:
          template: default:loot_table/self
        settings:
          hardness: 0.5
          resistance: 0.5
          map-color: 11
          is-suffocating: false
          is-redstone-conductor: false
          tags:
            - minecraft:mineable/pickaxe
            - minecraft:trapdoors
          sounds:
            break: minecraft:block.copper_grate.break
            fall: minecraft:block.copper_grate.fall
            hit: minecraft:block.copper_grate.hit
            place: minecraft:block.copper_grate.place
            step: minecraft:block.copper_grate.step
        states:
          template: default:block_state/trapdoor
          arguments:
            base_block: crimson_trapdoor
            model_bottom_path: wathe:block/stainless_steel_vent_hatch_bottom
            model_bottom_generation:
              parent: wathe:block/template_vent_hatch_trapdoor_bottom
              textures:
                texture: wathe:block/stainless_steel_vent_hatch
            model_open_path: wathe:block/stainless_steel_vent_hatch_open
            model_open_generation:
              parent: wathe:block/template_vent_hatch_trapdoor_open
              textures:
                texture: wathe:block/stainless_steel_vent_hatch
