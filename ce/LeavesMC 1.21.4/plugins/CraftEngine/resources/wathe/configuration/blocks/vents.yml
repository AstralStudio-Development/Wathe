# Vent Blocks
# vent_shaft: 3-axis placement (x/y/z), no auto-connect
# vent_hatch: simplified version (wall only, with open property)

items:
  # ==================== Vent Shafts (3-axis placement) ====================

  # Stainless Steel Vent Shaft
  wathe:stainless_steel_vent_shaft:
    data:
      item-name: <!i><lang:block.wathe.stainless_steel_vent_shaft>
    model:
      type: minecraft:model
      path: wathe:block/stainless_steel_vent_shaft_inventory
      generation:
        parent: wathe:block/template_vent_shaft_inventory
        textures:
          end: wathe:block/stainless_steel_vent_shaft_opening
          inside: wathe:block/stainless_steel_vent_shaft_inside
          side: wathe:block/stainless_steel_vent_shaft_side
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          map-color: 11
          is-suffocating: false
          is-redstone-conductor: false
          tags:
            - minecraft:mineable/pickaxe
            - minecraft:climbable
          sounds:
            break: minecraft:block.copper_grate.break
            fall: minecraft:block.copper_grate.fall
            hit: minecraft:block.copper_grate.hit
            place: minecraft:block.copper_grate.place
            step: minecraft:block.copper_grate.step
        states:
          properties:
            axis:
              type: axis
              default: y
          appearances:
            y:
              state: oak_log[axis=y]
              model:
                path: wathe:block/stainless_steel_vent_shaft_y
                generation:
                  parent: wathe:block/template_vent_shaft_inventory
                  textures:
                    end: wathe:block/stainless_steel_vent_shaft_opening
                    inside: wathe:block/stainless_steel_vent_shaft_inside
                    side: wathe:block/stainless_steel_vent_shaft_side
            x:
              state: oak_log[axis=x]
              model:
                path: wathe:block/stainless_steel_vent_shaft_x
                generation:
                  parent: wathe:block/template_vent_shaft_inventory
                  textures:
                    end: wathe:block/stainless_steel_vent_shaft_opening
                    inside: wathe:block/stainless_steel_vent_shaft_inside
                    side: wathe:block/stainless_steel_vent_shaft_side
                x: 90
                y: 90
            z:
              state: oak_log[axis=z]
              model:
                path: wathe:block/stainless_steel_vent_shaft_z
                generation:
                  parent: wathe:block/template_vent_shaft_inventory
                  textures:
                    end: wathe:block/stainless_steel_vent_shaft_opening
                    inside: wathe:block/stainless_steel_vent_shaft_inside
                    side: wathe:block/stainless_steel_vent_shaft_side
                x: 90
          variants:
            axis=y:
              appearance: y
            axis=x:
              appearance: x
            axis=z:
              appearance: z

