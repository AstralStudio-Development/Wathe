# Wood Slab Blocks
items:
  # Mahogany Slab (红木台阶)
  wathe:mahogany_slab:
    data:
      item-name: <!i><lang:block.wathe.mahogany_slab>
    model: wathe:block/mahogany_slab
    behavior:
      type: block_item
      block:
        behaviors:
          type: slab_block
        loot:
          template: default:loot_table/slab
        settings:
          hardness: -1.0
          resistance: 3600000.0
          map-color: 26
          tags:
            - minecraft:mineable/axe
            - minecraft:slabs
          sounds:
            break: minecraft:block.cherry_wood.break
            fall: minecraft:block.cherry_wood.fall
            hit: minecraft:block.cherry_wood.hit
            place: minecraft:block.cherry_wood.place
            step: minecraft:block.cherry_wood.step
        states:
          template: default:block_state/slab
          arguments:
            base_block: exposed_cut_copper_slab
            model_bottom_path: wathe:block/mahogany_slab
            model_bottom_generation:
              parent: minecraft:block/slab
              textures: &mahogany_textures
                bottom: wathe:block/mahogany_planks
                side: wathe:block/mahogany_planks
                top: wathe:block/mahogany_planks
            model_top_path: wathe:block/mahogany_slab_top
            model_top_generation:
              parent: minecraft:block/slab_top
              textures: *mahogany_textures
            model_double_path: wathe:block/mahogany_planks

