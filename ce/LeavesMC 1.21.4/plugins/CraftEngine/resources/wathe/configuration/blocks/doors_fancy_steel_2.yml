# Fancy Steel Door Blocks Part 2 using Glass Pane collision box
# No open/close functionality - just static doors with thin hitbox

items:
  # Muntz Steel Door
  wathe:muntz_steel_door:
    data:
      item-name: <!i><lang:block.wathe.muntz_steel_door>
    texture: wathe:item/muntz_steel_door
    behavior:
      type: double_high_block_item
      block:
        behavior:
          type: double_high_block
        loot:
          template: default:loot_table/door
        settings:
          hardness: -1
          resistance: 3600000
          map-color: 0
          push-reaction: block
          is-suffocating: false
          is-redstone-conductor: false
          tags:
            - minecraft:doors
          sounds:
            break: minecraft:block.copper.break
            fall: minecraft:block.copper.fall
            hit: minecraft:block.copper.hit
            place: minecraft:block.copper.place
            step: minecraft:block.copper.step
        states:
          properties:
            facing:
              type: horizontal_direction
            half:
              type: double_block_half
          appearances:
            facing=north,half=lower:
              state: cyan_stained_glass_pane[east=true,north=false,south=false,waterlogged=false,west=true]
              model:
                path: wathe:block/muntz_steel_door_bottom_left_centered
                y: 90
            facing=north,half=upper:
              state: purple_stained_glass_pane[east=true,north=false,south=false,waterlogged=false,west=true]
              model:
                path: wathe:block/muntz_steel_door_top_left_centered
                y: 90
            facing=south,half=lower:
              state: cyan_stained_glass_pane[east=true,north=false,south=true,waterlogged=false,west=true]
              model:
                path: wathe:block/muntz_steel_door_bottom_left_centered
                y: 270
            facing=south,half=upper:
              state: purple_stained_glass_pane[east=true,north=false,south=true,waterlogged=false,west=true]
              model:
                path: wathe:block/muntz_steel_door_top_left_centered
                y: 270
            facing=east,half=lower:
              state: cyan_stained_glass_pane[east=false,north=true,south=true,waterlogged=false,west=false]
              model:
                path: wathe:block/muntz_steel_door_bottom_left_centered
                y: 180
            facing=east,half=upper:
              state: purple_stained_glass_pane[east=false,north=true,south=true,waterlogged=false,west=false]
              model:
                path: wathe:block/muntz_steel_door_top_left_centered
                y: 180
            facing=west,half=lower:
              state: cyan_stained_glass_pane[east=true,north=true,south=true,waterlogged=false,west=false]
              model:
                path: wathe:block/muntz_steel_door_bottom_left_centered
            facing=west,half=upper:
              state: purple_stained_glass_pane[east=true,north=true,south=true,waterlogged=false,west=false]
              model:
                path: wathe:block/muntz_steel_door_top_left_centered
          variants:
            facing=north,half=lower:
              appearance: facing=north,half=lower
            facing=north,half=upper:
              appearance: facing=north,half=upper
            facing=south,half=lower:
              appearance: facing=south,half=lower
            facing=south,half=upper:
              appearance: facing=south,half=upper
            facing=east,half=lower:
              appearance: facing=east,half=lower
            facing=east,half=upper:
              appearance: facing=east,half=upper
            facing=west,half=lower:
              appearance: facing=west,half=lower
            facing=west,half=upper:
              appearance: facing=west,half=upper

