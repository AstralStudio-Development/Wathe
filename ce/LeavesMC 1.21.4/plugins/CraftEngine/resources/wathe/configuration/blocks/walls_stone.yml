# Stone Wall Blocks - Using fence_block behavior for auto-connection
items:
  # ==================== Marble Wall ====================
  wathe:marble_wall:
    data:
      item-name: <!i><lang:block.wathe.marble_wall>
    model:
      type: minecraft:model
      path: wathe:block/marble_wall_inventory
      generation:
        parent: minecraft:block/wall_inventory
        textures:
          wall: wathe:block/marble
    behavior:
      type: block_item
      block: wathe:marble_wall
  wathe:marble_wall_post:
    data:
      item-name: <!i><lang:block.wathe.marble_wall>
    model:
      type: minecraft:model
      path: wathe:block/marble_wall_post
      generation:
