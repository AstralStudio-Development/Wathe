      type: minecraft:model
      path: wathe:block/dark_marble_wall_side
      generation:
        parent: wathe:block/template_wall_side
        textures:
          wall: wathe:block/dark_marble

blocks:
  # ==================== Marble Wall ====================
  wathe:marble_wall:
    loot:
      template: default:loot_table/self
    settings:
      hardness: 2.0
      resistance: 2.0
      map-color: 8
      is-suffocating: false
      is-redstone-conductor: false
      tags:
        - minecraft:walls
        - minecraft:mineable/pickaxe
        - wathe:walls
      sounds:
        break: minecraft:block.calcite.break
        fall: minecraft:block.calcite.fall
        hit: minecraft:block.calcite.hit
        place: minecraft:block.calcite.place
        step: minecraft:block.calcite.step
    behavior:
      type: fence_block
      connectable-block-tag: minecraft:fences
    states:
      template: default:block_state/fence
      arguments:
        base_block: nether_brick_fence
        fence_post_item: wathe:marble_wall_post
        fence_side_item: wathe:marble_wall_side

  # ==================== Marble Tile Wall ====================
