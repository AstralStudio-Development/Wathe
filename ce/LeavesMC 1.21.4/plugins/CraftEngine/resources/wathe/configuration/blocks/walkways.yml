# Walkway Blocks
# Supports both top/bottom placement (like Fabric walkway half behavior)
items:
  wathe:metal_sheet_walkway:
    data:
      item-name: <!i><lang:block.wathe.metal_sheet_walkway>
    model:
      type: minecraft:model
      path: wathe:block/metal_sheet_walkway_bottom
      generation:
        parent: wathe:block/template_walkway_bottom
        textures:
          top: wathe:block/metal_sheet_walkway
          side: wathe:block/metal_sheet_walkway_side
    behavior:
      type: block_item
      block:
        behavior:
          type: trapdoor_block
          can-open-with-hand: false
          can-open-by-wind-charge: false
        loot:
          template: default:loot_table/self
        settings:
          hardness: 2.0
          resistance: 2.0
          is-suffocating: false
          is-redstone-conductor: false
          map-color: 11
          tags:
            - minecraft:mineable/pickaxe
          sounds:
            break: minecraft:block.copper_grate.break
            fall: minecraft:block.copper_grate.fall
            hit: minecraft:block.copper_grate.hit
            place: minecraft:block.copper_grate.place
            step: minecraft:block.copper_grate.step
        states:
          template: default:block_state/trapdoor
          arguments:
            base_block: oak_trapdoor
            model_bottom_path: wathe:block/metal_sheet_walkway_bottom
            model_bottom_generation:
              parent: wathe:block/template_walkway_bottom
              textures:
                top: wathe:block/metal_sheet_walkway
                side: wathe:block/metal_sheet_walkway_side
            model_open_path: wathe:block/metal_sheet_walkway_open
            model_open_generation:
              parent: wathe:block/template_walkway_bottom
              textures:
                top: wathe:block/metal_sheet_walkway
                side: wathe:block/metal_sheet_walkway_side
            model_top_path: wathe:block/metal_sheet_walkway_top
            model_top_generation:
              parent: wathe:block/template_walkway_top
              textures:
                top: wathe:block/metal_sheet_walkway
                side: wathe:block/metal_sheet_walkway_side

