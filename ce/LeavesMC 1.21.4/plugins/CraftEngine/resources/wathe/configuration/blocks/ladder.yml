# Ladder Blocks - Climbable wall-mounted blocks
items:
  # Stainless Steel Ladder
  wathe:stainless_steel_ladder:
    data:
      item-name: <!i><lang:block.wathe.stainless_steel_ladder>
    model:
      type: minecraft:model
      path: wathe:block/stainless_steel_ladder
      generation:
        parent: minecraft:block/ladder
        textures:
          texture: wathe:block/stainless_steel_ladder
          particle: wathe:block/stainless_steel_ladder
    behavior:
      type: block_item
      block:
        events:
          - template: default:rotatable_block
        loot:
          template: default:loot_table/self
        settings:
          hardness: 0.5
          resistance: 0.5
          map-color: 11
          is-suffocating: false
          is-redstone-conductor: false
          tags:
            - minecraft:climbable
          sounds:
            break: minecraft:block.lantern.break
            fall: minecraft:block.lantern.fall
            hit: minecraft:block.lantern.hit
            place: minecraft:block.lantern.place
            step: minecraft:block.lantern.step
        states:
          properties:
            facing:
              type: horizontal_direction
              default: north
          appearances:
            facing=north:
              state: ladder[facing=north,waterlogged=false]
              model:
                path: wathe:block/stainless_steel_ladder
                generation:
                  parent: minecraft:block/ladder
                  textures:
                    texture: wathe:block/stainless_steel_ladder
                    particle: wathe:block/stainless_steel_ladder
            facing=east:
              state: ladder[facing=east,waterlogged=false]
              model:
                path: wathe:block/stainless_steel_ladder
                generation:
                  parent: minecraft:block/ladder
                  textures:
                    texture: wathe:block/stainless_steel_ladder
                    particle: wathe:block/stainless_steel_ladder
                y: 90
            facing=south:
              state: ladder[facing=south,waterlogged=false]
              model:
                path: wathe:block/stainless_steel_ladder
                generation:
                  parent: minecraft:block/ladder
                  textures:
                    texture: wathe:block/stainless_steel_ladder
                    particle: wathe:block/stainless_steel_ladder
                y: 180
            facing=west:
              state: ladder[facing=west,waterlogged=false]
              model:
                path: wathe:block/stainless_steel_ladder
                generation:
                  parent: minecraft:block/ladder
                  textures:
                    texture: wathe:block/stainless_steel_ladder
                    particle: wathe:block/stainless_steel_ladder
                y: 270
          variants:
            facing=north:
              appearance: facing=north
            facing=east:
              appearance: facing=east
            facing=south:
              appearance: facing=south
            facing=west:
              appearance: facing=west
