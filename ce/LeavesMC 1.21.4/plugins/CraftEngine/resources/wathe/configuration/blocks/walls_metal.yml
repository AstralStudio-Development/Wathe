blocks:
  # ==================== Tarnished Gold Wall ====================
  wathe:tarnished_gold_wall:
    loot:
      template: default:loot_table/self
    settings:
      hardness: -1.0
      resistance: 3600000.0
      map-color: 43
      is-suffocating: false
      is-redstone-conductor: false
      tags:
        - minecraft:walls
        - minecraft:mineable/pickaxe
        - wathe:walls
      sounds:
        break: minecraft:block.copper.break
        fall: minecraft:block.copper.fall
        hit: minecraft:block.copper.hit
        place: minecraft:block.copper.place
        step: minecraft:block.copper.step
    behavior:
      type: fence_block
      connectable-block-tag: minecraft:fences
    states:
      template: default:block_state/fence
      arguments:
        base_block: nether_brick_fence
        fence_post_item: wathe:tarnished_gold_wall_post
        fence_side_item: wathe:tarnished_gold_wall_side

