blocks:
  # ==================== Smooth Anthracite Steel Wall ====================
  wathe:smooth_anthracite_steel_wall:
    loot:
      template: default:loot_table/self
    settings:
      hardness: 0.5
      resistance: 0.5
      map-color: 29
      is-suffocating: false
      is-redstone-conductor: false
      tags:
        - minecraft:walls
        - minecraft:mineable/pickaxe
        - wathe:walls
      sounds:
        break: minecraft:block.netherite_block.break
        fall: minecraft:block.netherite_block.fall
        hit: minecraft:block.netherite_block.hit
        place: minecraft:block.netherite_block.place
        step: minecraft:block.netherite_block.step
    behavior:
      type: fence_block
      connectable-block-tag: minecraft:fences
    states:
      template: default:block_state/fence
      arguments:
        base_block: nether_brick_fence
        fence_post_item: wathe:smooth_anthracite_steel_wall_post
        fence_side_item: wathe:smooth_anthracite_steel_wall_side

