# Fancy Steel Stairs Blocks
items:
  # Smooth Anthracite Steel Stairs (光滑无烟煤钢楼梯)
  wathe:smooth_anthracite_steel_stairs:
    model: wathe:block/smooth_anthracite_steel_stairs
    data:
      item-name: <!i><lang:block.wathe.smooth_anthracite_steel_stairs>
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          map-color: 29
          tags:
            - minecraft:mineable/pickaxe
            - minecraft:stairs
          sounds:
            break: minecraft:block.netherite_block.break
            fall: minecraft:block.netherite_block.fall
            hit: minecraft:block.netherite_block.hit
            place: minecraft:block.netherite_block.place
            step: minecraft:block.netherite_block.step
        behavior:
          type: stairs_block
        states:
          template: default:block_state/stairs
          arguments:
            base_block: andesite_stairs
            model_stairs_inner_path: wathe:block/smooth_anthracite_steel_stairs_inner
            model_stairs_inner_generation:
              parent: minecraft:block/inner_stairs
              textures: &smooth_anthracite_steel_textures
                bottom: wathe:block/smooth_anthracite_steel
                side: wathe:block/smooth_anthracite_steel
                top: wathe:block/smooth_anthracite_steel
            model_stairs_outer_path: wathe:block/smooth_anthracite_steel_stairs_outer
            model_stairs_outer_generation:
              parent: minecraft:block/outer_stairs
              textures: *smooth_anthracite_steel_textures
            model_stairs_path: wathe:block/smooth_anthracite_steel_stairs
            model_stairs_generation:
              parent: minecraft:block/stairs
              textures: *smooth_anthracite_steel_textures

