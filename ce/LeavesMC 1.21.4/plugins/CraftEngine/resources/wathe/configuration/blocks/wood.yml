  # Mahogany Cabinet (红木柜)
  wathe:mahogany_cabinet:
    data:
      item-name: <!i><lang:block.wathe.mahogany_cabinet>
    model: wathe:block/mahogany_cabinet
    behavior:
      type: block_item
      block:
        events:
          - template: default:rotatable_block
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          map-color: 26
          tags: ["minecraft:mineable/axe"]
          sounds:
            break: minecraft:block.cherry_wood.break
            fall: minecraft:block.cherry_wood.fall
            hit: minecraft:block.cherry_wood.hit
            place: minecraft:block.cherry_wood.place
            step: minecraft:block.cherry_wood.step
        states:
          properties:
            facing:
              type: horizontal_direction
              default: north
          appearances:
            north:
              state: barrel[facing=north]
              model:
                path: wathe:block/mahogany_cabinet
                generation:
                  parent: minecraft:block/orientable
                  textures:
                    top: wathe:block/mahogany_cabinet_side
                    front: wathe:block/mahogany_cabinet_front
                    side: wathe:block/mahogany_cabinet_side
            east:
              state: barrel[facing=east]
              model:
                path: wathe:block/mahogany_cabinet_east
                generation:
                  parent: minecraft:block/orientable
                  textures:
                    top: wathe:block/mahogany_cabinet_side
                    front: wathe:block/mahogany_cabinet_front
                    side: wathe:block/mahogany_cabinet_side
                  y: 90
            south:
              state: barrel[facing=south]
              model:
                path: wathe:block/mahogany_cabinet_south
                generation:
                  parent: minecraft:block/orientable
                  textures:
                    top: wathe:block/mahogany_cabinet_side
                    front: wathe:block/mahogany_cabinet_front
                    side: wathe:block/mahogany_cabinet_side
                  y: 180
            west:
              state: barrel[facing=west]
              model:
                path: wathe:block/mahogany_cabinet_west
                generation:
                  parent: minecraft:block/orientable
                  textures:
                    top: wathe:block/mahogany_cabinet_side
                    front: wathe:block/mahogany_cabinet_front
                    side: wathe:block/mahogany_cabinet_side
                  y: 270
          variants:
            facing=north:
              appearance: north
            facing=east:
              appearance: east
            facing=south:
              appearance: south
            facing=west:
              appearance: west

