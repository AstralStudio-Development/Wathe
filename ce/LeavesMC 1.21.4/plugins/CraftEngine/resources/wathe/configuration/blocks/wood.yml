# Wood Blocks - cube_all types
items:
  # Mahogany Series
  wathe:mahogany_planks:
    data:
      item-name: <!i><lang:block.wathe.mahogany_planks>
    model: wathe:block/mahogany_planks
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          is-suffocating: true
          is-redstone-conductor: true
          map-color: 26
          tags: ["minecraft:mineable/axe"]
          sounds:
            break: minecraft:block.cherry_wood.break
            fall: minecraft:block.cherry_wood.fall
            hit: minecraft:block.cherry_wood.hit
            place: minecraft:block.cherry_wood.place
            step: minecraft:block.cherry_wood.step
        state:
          auto-state: solid
          model:
            path: wathe:block/mahogany_planks
            generation:
              parent: minecraft:block/cube_all
              textures:
                all: wathe:block/mahogany_planks

