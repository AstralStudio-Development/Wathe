# Tray blocks
items:
  wathe:food_platter:
    data:
      item-name: <!i><lang:block.wathe.food_platter>
    model: wathe:block/food_platter
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 0.5
          resistance: 0.5
          map-color: 27
          burn-chance: 5
          fire-spread-chance: 20
          burnable: true
          is-suffocating: false
          is-redstone-conductor: false
          push-reaction: block
          instrument: bass
          support-shape: cobweb
          sounds:
            break: minecraft:block.copper.break
            fall: minecraft:block.copper.fall
            hit: minecraft:block.copper.hit
            place: minecraft:block.copper.place
            step: minecraft:block.copper.step
          tags:
            - minecraft:mineable/axe
        state:
          state: barrier
          entity-renderer:
            item: wathe:food_platter

  wathe:drink_tray:
    data:
      item-name: <!i><lang:block.wathe.drink_tray>
    model: wathe:block/drink_tray
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 0.5
          resistance: 0.5
          map-color: 27
          burn-chance: 5
          fire-spread-chance: 20
          burnable: true
          is-suffocating: false
          is-redstone-conductor: false
          push-reaction: block
          instrument: bass
          support-shape: cobweb
          sounds:
            break: minecraft:block.cherry_wood.break
            fall: minecraft:block.cherry_wood.fall
            hit: minecraft:block.cherry_wood.hit
            place: minecraft:block.cherry_wood.place
            step: minecraft:block.cherry_wood.step
          tags:
            - minecraft:mineable/axe
        state:
          state: barrier
          entity-renderer:
            item: wathe:drink_tray
