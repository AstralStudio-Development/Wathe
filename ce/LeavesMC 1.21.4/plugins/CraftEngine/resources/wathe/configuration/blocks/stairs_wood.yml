# Wood Stairs Blocks
items:
  # Ebony Stairs (乌木楼梯)
  wathe:ebony_stairs:
    model: wathe:block/ebony_stairs
    data:
      item-name: <!i><lang:block.wathe.ebony_stairs>
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: -1.0
          resistance: 3600000.0
          map-color: 29
          tags:
            - minecraft:mineable/axe
            - minecraft:stairs
          sounds:
            break: minecraft:block.cherry_wood.break
            fall: minecraft:block.cherry_wood.fall
            hit: minecraft:block.cherry_wood.hit
            place: minecraft:block.cherry_wood.place
            step: minecraft:block.cherry_wood.step
        behavior:
          type: stairs_block
        states:
          template: default:block_state/stairs
          arguments:
            base_block: exposed_cut_copper_stairs
            model_stairs_inner_path: wathe:block/ebony_stairs_inner
            model_stairs_inner_generation:
              parent: minecraft:block/inner_stairs
              textures: &ebony_textures
                bottom: wathe:block/ebony_planks
                side: wathe:block/ebony_planks
                top: wathe:block/ebony_planks
            model_stairs_outer_path: wathe:block/ebony_stairs_outer
            model_stairs_outer_generation:
              parent: minecraft:block/outer_stairs
              textures: *ebony_textures
            model_stairs_path: wathe:block/ebony_stairs
            model_stairs_generation:
              parent: minecraft:block/stairs
              textures: *ebony_textures

