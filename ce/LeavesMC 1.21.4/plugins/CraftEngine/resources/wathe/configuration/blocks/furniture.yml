# Furniture blocks - Couches, tables, etc.
items:
  # ==================== Leather Couches ====================
  # Inner model for leather couches (used for corner connections)
  wathe:beige_leather_couch_inner:
    model:
      type: minecraft:model
      path: wathe:block/beige_leather_couch_inner
      generation:
        parent: wathe:block/template_leather_couch_middle
        textures:
          texture: wathe:block/beige_leather_couch

