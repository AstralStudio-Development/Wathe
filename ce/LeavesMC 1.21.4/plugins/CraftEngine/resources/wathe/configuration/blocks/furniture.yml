    behavior:
      type: block_item
      block:
        events:
          - template: default:rotatable_block
        loot:
          template: default:loot_table/self
        settings:
          hardness: 0.5
          resistance: 0.5
          map-color: 27
          burn-chance: 5
          fire-spread-chance: 20
          burnable: true
          is-suffocating: false
          is-redstone-conductor: false
