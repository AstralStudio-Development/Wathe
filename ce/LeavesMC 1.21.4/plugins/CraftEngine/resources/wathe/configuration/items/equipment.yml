# Equipment Items
items:
  wathe:invisible_chestplate:
    material: chainmail_chestplate
    data:
      item-name: " "
      max-stack-size: 1
    model:
      type: minecraft:model
      path: wathe:item/invisible
      generation:
        parent: minecraft:item/generated
        textures:
          layer0: wathe:item/invisible

  wathe:invisible_leggings:
    material: chainmail_leggings
    data:
      item-name: " "
