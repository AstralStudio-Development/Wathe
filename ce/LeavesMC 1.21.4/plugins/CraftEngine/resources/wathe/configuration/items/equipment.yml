  wathe:key:
    data:
      item-name: <!i><lang:item.wathe.key>
      max-stack-size: 1
    model: wathe:item/key

  wathe:lockpick:
    data:
      item-name: <!i><lang:item.wathe.lockpick>
      max-stack-size: 1
    model: wathe:item/lockpick

  wathe:knife:
    material: trident
    data:
      item-name: <!i><lang:item.wathe.knife>
      max-stack-size: 1
      max-damage: 250
    model:
      type: minecraft:select
      property: minecraft:display_context
      cases:
        - when:
            - gui
            - ground
            - fixed
            - on_shelf
          model:
            type: minecraft:model
            path: wathe:item/knife
            generation:
              parent: minecraft:item/generated
              textures:
                layer0: wathe:item/knife
      fallback:
        type: minecraft:condition
        property: minecraft:using_item
        on-true:
          type: minecraft:model
          path: wathe:item/knife_throwing
        on-false:
          type: minecraft:model
          path: wathe:item/knife_in_hand

  wathe:bat:
    data:
      item-name: <!i><lang:item.wathe.bat>
      max-stack-size: 1
    model: wathe:item/bat

  wathe:crowbar:
    data:
      item-name: <!i><lang:item.wathe.crowbar>
      max-stack-size: 1
    model: wathe:item/crowbar

  wathe:grenade:
