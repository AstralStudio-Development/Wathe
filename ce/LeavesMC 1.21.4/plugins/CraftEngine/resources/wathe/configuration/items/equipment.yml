      max-stack-size: 1
    model: wathe:item/firecracker

  wathe:revolver:
    material: crossbow
    data:
      item-name: <!i><lang:item.wathe.revolver>
      max-stack-size: 1
    client-bound-data:
      components:
        minecraft:charged_projectiles:
          - id: minecraft:arrow
    model:
      type: minecraft:select
      property: minecraft:display_context
      cases:
        - when:
            - gui
            - ground
            - fixed
            - on_shelf
          model:
            type: minecraft:model
            path: wathe:item/revolver
        - when:
            - firstperson_lefthand
            - firstperson_righthand
          model:
            type: minecraft:model
            path: wathe:item/revolver_firstperson
      fallback:
        type: minecraft:model
        path: wathe:item/revolver_in_hand

