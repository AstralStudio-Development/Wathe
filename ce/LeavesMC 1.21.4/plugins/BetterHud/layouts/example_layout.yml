time_layout:
  texts:
    1:
      name: example_font
      space: 2
      pattern: "[papi:wathe_timer]"
      scale: 0.5
      x: 0
      y: 5
      align: center
      outline: true
      conditions:
        1:
          first: (number)papi:wathe_is_killer
          second: 1
          operation: '=='
        2:
          first: (number)papi:wathe_game_state
          second: 1
          operation: '=='
status_layout:
  texts:
    1:
      name: example_font
      space: 0.5
      scale: 0.5
      pattern: |
       已登车玩家 [papi:wathe_ready_players]//[papi:wathe_online_players]
       <gray>玩家数达到 6 人及以上后将自动开始游戏
       <gold>当前模式 谋杀模式
      line-align: center
      line: 3
      split-width: 150
      line-width: 10
      x: -70
      y: 6
      outline: true
      conditions:
        1:
          first: (number)papi:wathe_game_state
          second: 0
          operation: '=='
    2:
      name: example_font
      space: 0.5
      scale: 0.5
      pattern: |
       已登车玩家 [papi:wathe_ready_players]//[papi:wathe_online_players]
       <green>游戏将在 [papi:wathe_countdown] 秒后开始
       <gold>当前模式 谋杀模式
      line-align: center
      line: 3
      split-width: 150
      line-width: 10
      x: -43
      y: 6
      outline: true
      conditions:
        1:
          first: (number)papi:wathe_game_state
          second: 3
          operation: '=='
