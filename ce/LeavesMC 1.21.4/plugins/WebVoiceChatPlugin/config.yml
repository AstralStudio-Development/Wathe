# WebVoiceChat Plugin Configuration

# Use SFU mode (requires separate media server)
# Set to true to use the SFU media server for better performance
use-sfu-mode: true

# Media server URL (only used when use-sfu-mode is true)
media-server-url: "http://localhost:8080"

# Maximum distance for voice chat (in blocks)
max-distance: 20.0
